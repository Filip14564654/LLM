name: LLM
channels:
  - defaults
  - conda-forge
  - pytorch
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - pytorch
  - torchvision
  - torchaudio
  - cpuonly
  - pip:
      - datasets
      - pyyaml
      - pytest


### ACTIVATE
# conda activate LLM

### UPDATE
# conda env update -f environment.yml --prune