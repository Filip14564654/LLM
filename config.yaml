# Default training configuration
train_file: data/processed/shakespeare_train.txt
val_file: data/processed/shakespeare_validation.txt
vocab_file: tokenizer/vocab.json
vocab_size: 10000
batch_size: 4
lr: 0.001
pretrain_file: data/processed/general_sample.txt
pretrain_epochs: 1
epochs: 3
model:
  embed_dim: 128
  num_heads: 4
  ff_dim: 256
  num_layers: 4
  max_len: 512
  dropout: 0.1
  positional_encoding: learned
checkpoint_path: model_checkpoint.pt
