train_file: data/processed/shakespeare_train.txt
val_file: data/processed/shakespeare_validation.txt
vocab_file: tokenizer/vocab.json
vocab_size: 2000

batch_size: 32
lr: 5e-4
epochs: 20
pretrain_file: null
