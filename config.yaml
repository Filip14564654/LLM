# Default training configuration
train_file: data/dataset/train1.txt
val_file: data/dataset/val1.txt
vocab_file: tokenizer/vocab.json
vocab_size: 32000  # Zvětšeno z 10000 na 32000 aby se vyhnul kolizím
batch_size: 32  # Zvětšeno z 4 na 32 pro lepší gradient estimates
lr: 0.0003  # Sníženo z 0.001 pro stabilnější učení
pretrain_file: data/processed/general_sample.txt
pretrain_epochs: 1
epochs: 10  # Sníženo z 10 na 5 - early stopping se postará o zbytek
model:
  embed_dim: 128
  num_heads: 4
  ff_dim: 256
  num_layers: 4
  max_len: 256  # Sníženo z 512 pro efektivnější trénování
  dropout: 0.2  # Zvýšeno z 0.1 na 0.2 pro lepší regularizaci
  positional_encoding: learned
checkpoint_path: model_checkpoint.pt

# Early stopping configuration
early_stopping:
  patience: 3  # Počet epoch bez zlepšení před zastavením
  min_delta: 0.001  # Minimální zlepšení pro resetování patience
